services:
  - type: web
    name: crazy-eights-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: PORT
        value: 3001

  - type: web
    name: crazy-eights-frontend
    env: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    publishDir: frontend/dist
    envVars:
      - key: VITE_SOCKET_URL
        value: https://crazy-eights-backend.onrender.com
